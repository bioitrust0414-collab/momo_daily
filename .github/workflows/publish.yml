name: Publish scheduled post

on:
  schedule:
    # UTC 00:00 = 台灣時間 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: {}  # 方便手動測試

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml requests

      - run: python scripts/publish_to_meta.py
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: archive published post"
          file_pattern: "schedule/*.yaml"
