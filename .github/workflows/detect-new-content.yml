name: Detect new content

on:
  push:
    paths:
      - 'content/**'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - run: python scripts/scan_new_content.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add draft entries for new content"
          file_pattern: "schedule/content-calendar.yaml"
